<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pins — Email Confirmed</title>
<style>
  body {
    background-color: #0E1812;
    color: #F5EDD8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 24px;
    line-height: 1.6;
    text-align: center;
  }
  h1 {
    color: #F5EDD8;
    font-size: 32px;
    margin-bottom: 8px;
  }
  p {
    color: #E8DFC8;
    font-size: 17px;
  }
  a.button {
    display: inline-block;
    background-color: #B7925A;
    color: #1C3A2A;
    text-decoration: none;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 12px;
    margin-top: 24px;
  }
  .card {
    background-color: #1C3A2A;
    border-radius: 16px;
    padding: 32px 24px;
    margin-top: 32px;
  }
  .footer {
    margin-top: 48px;
    font-size: 14px;
    color: #8a9a8f;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>You&rsquo;re confirmed!</h1>
    <p>Your email is verified and your Pins account is ready to go.</p>
    <a class="button" href="pins://auth/confirmed">Open Pins</a>
    <p style="margin-top: 24px; font-size: 14px; color: #b7a98c;">
      If nothing happens, open the Pins app yourself and sign in.
    </p>
  </div>

  <div class="footer">
    Pins &copy; 2026 Brian Anderson
  </div>
</body>
</html>
